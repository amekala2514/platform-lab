kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: platform-lab

nodes:
  - role: control-plane
    # Label this node so nginx ingress knows where to schedule
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # Map container ports to host ports for ingress traffic
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
