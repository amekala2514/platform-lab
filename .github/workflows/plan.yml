name: plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init (no backend)
        id: init
        run: terraform init -backend=false

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      # Plan only the resources that don't require a live cluster.
      # kubernetes_manifest does a server-side dry-run during plan,
      # which fails without a real cluster. Those run in local dev only.
      - name: Terraform plan (cluster + helm releases)
        id: plan
        continue-on-error: true
        run: |
          terraform plan -no-color -input=false \
            -target=kind_cluster.platform_lab \
            -target=kubernetes_namespace.observability \
            -target=kubernetes_namespace.ingress_nginx \
            -target=helm_release.metrics_server \
            -target=helm_release.kube_prometheus_stack \
            -target=helm_release.ingress_nginx \
            -target=kubernetes_config_map.platform_api_dashboard \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Format plan for PR comment
        id: format
        run: |
          {
            echo 'plan_output<<PLAN_EOF'
            tail -c 60000 plan.txt
            echo 'PLAN_EOF'
          } >> $GITHUB_OUTPUT

      - name: Post plan to PR
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.format.outputs.plan_output }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_EXITCODE: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fmt = process.env.FMT_OUTCOME;
            const init = process.env.INIT_OUTCOME;
            const validate = process.env.VALIDATE_OUTCOME;
            const planExit = process.env.PLAN_EXITCODE;
            const planOutput = process.env.PLAN_OUTPUT || '(empty)';

            const icon = (s) => s === 'success' ? '✅' : '❌';
            const planIcon = planExit === '0' ? '✅' : '❌';

            const body = `## Terraform Plan

            | Step | Result |
            |---|---|
            | fmt | ${icon(fmt)} \`${fmt}\` |
            | init | ${icon(init)} \`${init}\` |
            | validate | ${icon(validate)} \`${validate}\` |
            | plan | ${planIcon} exit code \`${planExit}\` |

            > Note: plan covers cluster + Helm releases only. The \`kubernetes_manifest\` resources require a live cluster and are planned during local dev.

            <details>
            <summary>📋 Plan output</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }} · commit \`${{ github.event.pull_request.head.sha }}\`.*`;

            // Find any existing plan comment from this bot and update it
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
