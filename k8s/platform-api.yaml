---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: default
  labels:
    app: platform-api
    version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
        version: "0.1.0"
    spec:
      containers:
        - name: platform-api
          image: platform-api:dev
          # Use IfNotPresent so kind's loaded image is used (not remote registry)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: default
  labels:
    app: platform-api
spec:
  selector:
    app: platform-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
