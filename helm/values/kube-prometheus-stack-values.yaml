fullnameOverride: kps

# Disable rules that don't work on Kind
defaultRules:
  create: true
  disabled:
    NodeClockNotSynchronising: true
    NodeClockSkewDetected: true
    CPUThrottlingHigh: true

# Disable scraping control-plane components that bind to 127.0.0.1 on Kind
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits:   { cpu: 200m, memory: 256Mi }

grafana:
  adminPassword: "platform-admin"
  defaultDashboardsTimezone: browser
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 300m, memory: 384Mi }
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    resources:
      requests: { cpu: 100m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1500Mi }
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

prometheusOperator:
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

kube-state-metrics:
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits:   { cpu: 100m, memory: 128Mi }

prometheus-node-exporter:
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits:   { cpu: 200m, memory: 64Mi }
